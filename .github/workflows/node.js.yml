name: Node.js CICD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  compile:
    runs-on: Agent-1
    
    steps:  
      - name: checkout code 
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4 
        with:
          node-version: '23'
          
      - name: Frontend Compilation (syntax error)
        run: |
          cd client  
          find . -name "*.js" -exec node --check {} + 

      - name: Backend compilation (syntax error) 
        run: |
          cd api 
          find . -name "*.js" -exec node --check {} + 

  gitleaks-scan:
    runs-on: Agent-1
    steps: 
      - name: checkout code 
        uses: actions/checkout@v4
      
      - name: git leaks scans 
        uses: gitleaks/gitleaks-action@v2

      - name: gitleaks scan 
        run: | 
          gitleaks detect --source ./client --exit-code 1
          gitleaks detect --source ./api --exit-code 1 

  Trivy_fs_scan:
      runs-on: Agent-1
      steps:
        - name: Checkout code
          uses: actions/checkout@v4
          
        - name: Run Trivy vulnerability scanner in fs mode
          uses: aquasecurity/trivy-action@v0.36.0
          with:
            scan-type: 'fs'
            scan-ref: '.'
            format: 'table'
            ignore-unfixed: true
            vuln-type: 'os,library'
            severity: 'CRITICAL,HIGH'

            trivy-config: trivy.yaml

          
        
      
         


        
    
        
